version: '3.8'
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
  app:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
  worker:
    build: .
    command: rq worker scraper-queue
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
