services:
  - type: web
    name: anime-embed-hunter
    runtime: python
    plan: free
    buildCommand: "./render-build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: FLASK_DEBUG
        value: "false"
      - key: DATABASE_URL
        value: "postgresql://postgres.oynbnwlwypckquukuxrw:Miaumiau66.@aws-1-sa-east-1.pooler.supabase.com:6543/postgres?sslmode=require"
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        value: "6767"
      - key: HEADLESS
        value: "true"
      - key: BROWSER_TIMEOUT
        value: "60000"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/.render/ms-playwright"
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Redis (scraper queue)
      - key: REDIS_URL
        fromService:
          type: redis
          name: anime-embed-hunter-redis
          property: connectionString
      # Cache com Redis em producao
      - key: CACHE_TYPE
        value: "flask_caching.backends.rediscache.RedisCache"
      - key: CACHE_REDIS_URL
        fromService:
          type: redis
          name: anime-embed-hunter-redis
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: redis
          name: anime-embed-hunter-redis
          property: connectionString

  - type: redis
    name: anime-embed-hunter-redis
    plan: free
    ipAllowList: []
