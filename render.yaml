services:
  - type: web
    name: anime-embed-hunter
    runtime: docker
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_DEBUG
        value: "false"
      - key: HEADLESS
        value: "true"
      # IMPORTANT: Set these in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        placeholder: "Sua chave de API super secreta"
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString

databases:
  - name: anime-db
    plan: free # Use 'standard' if you need persistence beyond 90 days
    region: oregon # Change to your preferred region
