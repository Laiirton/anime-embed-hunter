services:
  - type: web
    name: anime-embed-hunter
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
      flask --app run.py db upgrade
    startCommand: gunicorn run:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 5000
      - key: FLASK_DEBUG
        value: false
      - key: HEADLESS
        value: true
    autoDeploy: true
